<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Terminal | Virtual OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="terminal">
        <div id="output">
            <div>Welcome to WebTerm v1.0.0</div>
            <div>Type 'help' to see a list of available commands.</div>
        </div>
        <div id="input-line">
            <span id="prompt">kumar@webterm:~$</span>
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
